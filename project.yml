name: RussianWordADay
options:
  bundleIdPrefix: com.zackmiller
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  RussianWordADay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RussianWordADayApp/Sources
      - path: RussianWordADayApp/PrivacyInfo.xcprivacy
      - path: RussianWordADayApp/Resources/dictionary.sqlite
        buildPhase: resources
      - path: RussianWordADayApp/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zackmiller.RussianWordADay
        PRODUCT_NAME: RussianWordADay
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RussianWordADayApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: "Word a Day"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
